<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WebChef 로그인</title>

    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="login-page">

    <section class="login-wrapper">

        <div class="login-info">
            <span>WELCOME BACK</span>

            <h1>
                다시 오신 걸<br>
                환영합니다.
            </h1>

            <p>
                WebChef에서 오늘도 자취 요리와 생활 실력을 차근차근 키워보세요.
            </p>

            <div class="login-info-card">
                <h3>오늘 추천 기능</h3>
                <p>냉장고 속 재료를 입력하면 만들 수 있는 요리와 강의를 바로 찾아드려요.</p>
                <a href="/fridge">냉장고를 부탁해 ></a>
            </div>
        </div>

        <div class="login-box">

            <div class="login-title">
                <h2>로그인</h2>
                <p>아이디와 비밀번호를 입력해주세요.</p>
            </div>

            <div class="alert error-alert" th:if="${param.error}">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>

            <div class="alert success-alert" th:if="${param.logout}">
                로그아웃되었습니다.
            </div>

            <form action="/user/loginProc" method="post" class="login-form">

                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="아이디를 입력하세요"
                           autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="비밀번호를 입력하세요"
                           autocomplete="current-password">
                </div>

                <button type="submit" class="login-submit-btn">로그인</button>

            </form>

            <div class="login-links">
                <a href="/user/create">회원가입</a>
                <span>|</span>
                <a href="/user/find-id">아이디 찾기</a>
                <span>|</span>
                <a href="/user/find-password">비밀번호 찾기</a>
            </div>

        </div>

    </section>

</main>

</body>
</html>
