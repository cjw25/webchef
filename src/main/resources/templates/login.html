<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WebChef 로그인</title>
</head>
<body>

<h1>로그인</h1>

<form action="/user/loginProc" method="post">
    <div>
        <label>아이디</label>
        <input type="text" name="username" placeholder="아이디">
    </div>

    <div>
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호">
    </div>

    <button type="submit">로그인</button>
</form>

<div>
    <a href="/user/create">회원가입</a>
    <a href="/user/find-id">아이디 찾기</a>
    <a href="/user/find-password">비밀번호 찾기</a>
</div>

</body>
</html>
