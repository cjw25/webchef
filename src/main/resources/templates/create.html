<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WebChef 회원가입</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <a href="/">
      <img src="/img/webchef-logo.png" alt="WebChef 로고" class="logo-full-img">
    </a>
  </div>

  <nav class="nav">
    <a href="/course/list">강의</a>
    <a href="/mypage">학습 플랜</a>
    <a href="/community/list">커뮤니티</a>
  </nav>
</header>

<main class="login-page">
  <section class="login-box">
    <h1>회원가입</h1>
    <p>WebChef 계정을 생성하세요.</p>

    <div th:if="${errorMessage}" style="color: red; margin-bottom: 15px;">
      <p th:text="${errorMessage}"></p>
    </div>

    <form action="/user/create" method="post">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" placeholder="아이디를 입력하세요">
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
      </div>

      <div class="form-group">
        <label for="passwordCheck">비밀번호 확인</label>
        <input type="password" id="passwordCheck" name="passwordCheck" placeholder="비밀번호를 다시 입력하세요">
      </div>

      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력하세요">
      </div>

      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="이메일을 입력하세요">
      </div>

      <button type="submit" class="login-btn">회원가입</button>
    </form>

    <div class="login-links">
      <a href="/user/login">이미 계정이 있으신가요? 로그인</a>
    </div>
  </section>
</main>

</body>
</html>
