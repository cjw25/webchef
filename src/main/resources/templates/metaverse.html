<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WebChef 2D 메타버스</title>

    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/metaverse.css">
    <link rel="stylesheet" href="/css/footer.css">

    <script src="/js/footer.js" defer></script>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="metaverse-page">

    <section class="metaverse-header">
        <div>
            <span>WEBGL METAVERSE</span>
            <h1>WebChef 2D 메타버스</h1>
            <p>자취방, 요리 강의실, 커뮤니티 광장을 WebGL로 체험하는 공간입니다.</p>
        </div>

        <a href="/" class="back-btn">메인으로 돌아가기</a>
    </section>

    <section class="unity-wrapper">

        <div class="unity-top-bar">
            <div>
                <strong>WebChef Room</strong>
                <p>Unity WebGL 실행 화면</p>
            </div>

            <button type="button" id="fullscreenBtn">전체화면</button>
        </div>

        <div id="unity-container" class="unity-container">
            <canvas id="unity-canvas" tabindex="-1"></canvas>

            <div id="unity-loading-bar">
                <div class="loading-text">WebChef 메타버스 불러오는 중...</div>

                <div class="progress-bg">
                    <div id="unity-progress-bar-full"></div>
                </div>
            </div>

            <div id="unity-warning"></div>
        </div>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const fullscreenBtn = document.querySelector("#fullscreenBtn");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(message, type) {
        function updateBannerVisibility() {
            warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        const div = document.createElement("div");
        div.innerHTML = message;
        div.className = type === "error" ? "unity-error" : "unity-warning";
        warningBanner.appendChild(div);

        if (type !== "error") {
            setTimeout(function () {
                if (warningBanner.contains(div)) {
                    warningBanner.removeChild(div);
                }

                updateBannerVisibility();
            }, 5000);
        }

        updateBannerVisibility();
    }

    const buildUrl = "/metaverse/WebChefUnity/Build";

    const loaderUrl = buildUrl + "/WebChefUnity.loader.js";

    const config = {
        dataUrl: buildUrl + "/WebChefUnity.data",
        frameworkUrl: buildUrl + "/WebChefUnity.framework.js",
        codeUrl: buildUrl + "/WebChefUnity.wasm",
        streamingAssetsUrl: "/metaverse/WebChefUnity/StreamingAssets",
        companyName: "FiveChef",
        productName: "WebChefUnity",
        productVersion: "1.0",
        showBanner: unityShowBanner
    };

    loadingBar.style.display = "flex";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
            progressBarFull.style.width = 100 * progress + "%";
        }).then(function (unityInstance) {
            loadingBar.style.display = "none";

            fullscreenBtn.onclick = function () {
                unityInstance.SetFullscreen(1);
            };

        }).catch(function (message) {
            alert("Unity WebGL 실행 오류: " + message);
        });
    };

    script.onerror = function () {
        alert("Unity loader 파일을 찾을 수 없습니다. WebChefUnity.loader.js 경로를 확인하세요.");
    };

    document.body.appendChild(script);
</script>

</body>
</html>
